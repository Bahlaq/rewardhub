<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      ═══════════════════════════════════════════════════════════════
      POLYFILLS — must appear FIRST, before any <script type="module">.
      These patch Web APIs that Firebase 12.x / Motion 12.x need but
      that are missing in iOS < 15.4 (Safari < 15.4):
        • structuredClone  — added Safari 15.4, Mar 2022
        • Object.hasOwn    — added Safari 15.4, Mar 2022
        • Array/String.at  — added Safari 15.4, Mar 2022
        • Promise.any      — added Safari 15,   Sep 2021
      Without these, initializeFirestore() throws ReferenceError on
      older devices and the entire module graph fails silently as
      WKWebView's opaque "Script error."
      ═══════════════════════════════════════════════════════════════
    -->
    <script>
      (function () {
        /* structuredClone */
        if (typeof structuredClone !== 'function') {
          self.structuredClone = function sc(val) {
            if (val === undefined) return undefined;
            try { return JSON.parse(JSON.stringify(val)); } catch (e) { return val; }
          };
        }

        /* Object.hasOwn */
        if (typeof Object.hasOwn !== 'function') {
          Object.hasOwn = function hasOwn(obj, key) {
            return Object.prototype.hasOwnProperty.call(obj, key);
          };
        }

        /* Array.prototype.at / String.prototype.at */
        ['Array', 'String'].forEach(function (name) {
          var proto = self[name] && self[name].prototype;
          if (proto && typeof proto.at !== 'function') {
            Object.defineProperty(proto, 'at', {
              value: function at(n) {
                n = Math.trunc(n) || 0;
                if (n < 0) n += this.length;
                return (n >= 0 && n < this.length) ? this[n] : undefined;
              },
              writable: true,
              configurable: true,
            });
          }
        });

        /* Promise.any */
        if (typeof Promise !== 'undefined' && typeof Promise.any !== 'function') {
          Promise.any = function any(iterable) {
            var promises = Array.from(iterable);
            return new Promise(function (resolve, reject) {
              if (!promises.length) {
                reject(new AggregateError([], 'All promises were rejected'));
                return;
              }
              var errs = new Array(promises.length);
              var remaining = promises.length;
              promises.forEach(function (p, i) {
                Promise.resolve(p).then(resolve, function (e) {
                  errs[i] = e;
                  if (!--remaining) {
                    reject(new AggregateError(errs, 'All promises were rejected'));
                  }
                });
              });
            });
          };
        }
      })();
    </script>

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <title>RewardHub</title>
    <link rel="icon" type="image/png" href="./favicon.png" />

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #fff; }
      #rh-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font: 14px -apple-system, system-ui, sans-serif; color: #888;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="rh-loader">Loading RewardHub…</div>
    </div>

    <!--
      ═══════════════════════════════════════════════════════════════
      INLINE ERROR HANDLER — runs synchronously before any module
      script. Catches parse errors, network errors, and early crashes.
      ═══════════════════════════════════════════════════════════════
    -->
    <script>
      (function () {
        function show(title, body) {
          try {
            var root = document.getElementById('root') || document.body;
            root.innerHTML =
              '<div style="padding:16px;font:13px/1.4 ui-monospace,Menlo,monospace;background:#fff;color:#111;position:fixed;inset:0;overflow:auto;">' +
                '<div style="color:#b00020;font-weight:700;margin-bottom:8px;font-size:15px;">' + title + '</div>' +
                '<pre style="white-space:pre-wrap;word-break:break-word;background:#f5f5f5;padding:12px;border-radius:8px;margin:0;">' +
                  String(body).replace(/</g, '&lt;') +
                '</pre>' +
              '</div>';
          } catch (_) {
            console.error(title, body);
          }
        }

        window.addEventListener('error', function (e) {
          var t = e.target;
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK' || t.tagName === 'IMG')) {
            show(
              'Asset failed to load',
              t.tagName + ': ' + (t.src || t.href || '(no src)') +
              '\n\nFile missing from www/ bundle or wrong path. ' +
              'Check vite.config.ts: base:"./" and build.outDir:"www".'
            );
            return;
          }

          var msg = e.message || '';
          var detail;
          if (!e.filename && msg.indexOf('Script error') === 0) {
            detail =
              'WKWebView reported an opaque "Script error." — this means a ' +
              'JS module crashed before it could identify itself.\n\n' +
              'MOST LIKELY CAUSE on this device:\n' +
              '  Missing Web API polyfill — the polyfill block in <head>\n' +
              '  should have fixed structuredClone / Object.hasOwn / Array.at.\n' +
              '  If you still see this, check the browser console for:\n' +
              '    ReferenceError / TypeError from Firebase or Motion.\n\n' +
              'Other causes:\n' +
              '  • Firebase config (apiKey/projectId) mismatch\n' +
              '  • A native plugin calling a method unavailable on iOS\n' +
              '  • iOS < 14 (Capacitor 6 requires iOS 14 minimum)';
          } else {
            detail =
              ((e.error && e.error.stack) || (e.error && e.error.message) || msg) +
              '\n\nFile: ' + (e.filename || '(unknown)') +
              ':' + (e.lineno || 0) + ':' + (e.colno || 0);
          }
          show('JS error', detail);
        }, true);

        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          show(
            'Unhandled promise rejection',
            (r && r.stack) || (r && r.message) || (typeof r === 'string' ? r : JSON.stringify(r))
          );
        });

        setTimeout(function () {
          var loader = document.getElementById('rh-loader');
          if (loader && loader.parentNode) {
            show(
              'App never mounted (15s timeout)',
              'Bundle loaded but React never rendered. Likely causes:\n' +
              '  • Firebase init hanging (check apiKey / network)\n' +
              '  • A top-level await that never resolves\n' +
              '  • An infinite loop during module evaluation'
            );
          }
        }, 15000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
