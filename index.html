<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <title>RewardHub</title>
    <link rel="icon" type="image/png" href="./favicon.png" />

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #fff; }
      #rh-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font: 14px -apple-system, system-ui, sans-serif; color: #888;
      }
    </style>

    <!--
      POLYFILLS — must run synchronously before any module script.
      Each guard is intentional: never overwrite a native implementation.
    -->
    <script>
      // globalThis
      (function () {
        if (typeof globalThis === 'undefined') {
          Object.defineProperty(Object.prototype, '__globalThis__', {
            get: function () { return this; },
            configurable: true,
          });
          /* global __globalThis__ */
          globalThis = __globalThis__;
          delete Object.prototype.__globalThis__;
        }
      })();

      // WeakRef
      if (typeof WeakRef === 'undefined') {
        window.WeakRef = function WeakRef(target) { this._t = target; };
        window.WeakRef.prototype.deref = function () { return this._t; };
      }

      // FinalizationRegistry (no-op shim — GC hooks unavailable in JS)
      if (typeof FinalizationRegistry === 'undefined') {
        window.FinalizationRegistry = function FinalizationRegistry() {};
        window.FinalizationRegistry.prototype.register = function () {};
        window.FinalizationRegistry.prototype.unregister = function () {};
      }

      // Promise.any
      if (typeof Promise.any === 'undefined') {
        Promise.any = function (promises) {
          return new Promise(function (resolve, reject) {
            var n = 0, errors = [];
            var arr = Array.prototype.slice.call(promises);
            if (arr.length === 0) return reject(new AggregateError([], 'All promises were rejected'));
            arr.forEach(function (p, i) {
              Promise.resolve(p).then(resolve, function (e) {
                errors[i] = e;
                if (++n === arr.length) reject(new AggregateError(errors, 'All promises were rejected'));
              });
            });
          });
        };
      }

      // structuredClone
      if (typeof structuredClone === 'undefined') {
        window.structuredClone = function (obj) {
          if (obj === undefined) return undefined;
          return JSON.parse(JSON.stringify(obj));
        };
      }

      // Object.hasOwn
      if (typeof Object.hasOwn === 'undefined') {
        Object.hasOwn = function (obj, key) {
          return Object.prototype.hasOwnProperty.call(obj, key);
        };
      }

      // Array.prototype.at
      if (typeof Array.prototype.at === 'undefined') {
        Array.prototype.at = function (n) {
          n = Math.trunc(n) || 0;
          if (n < 0) n += this.length;
          return (n < 0 || n >= this.length) ? undefined : this[n];
        };
      }

      // String.prototype.at
      if (typeof String.prototype.at === 'undefined') {
        String.prototype.at = function (n) {
          n = Math.trunc(n) || 0;
          if (n < 0) n += this.length;
          return (n < 0 || n >= this.length) ? undefined : this[n];
        };
      }

      // crypto.randomUUID
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'undefined') {
        crypto.randomUUID = function () {
          var b = crypto.getRandomValues(new Uint8Array(16));
          b[6] = (b[6] & 0x0f) | 0x40;
          b[8] = (b[8] & 0x3f) | 0x80;
          var h = Array.from(b).map(function (x) { return x.toString(16).padStart(2, '0'); });
          return h[0]+h[1]+h[2]+h[3]+'-'+h[4]+h[5]+'-'+h[6]+h[7]+'-'+h[8]+h[9]+'-'+h[10]+h[11]+h[12]+h[13]+h[14]+h[15];
        };
      }

      // CSS.registerProperty — motion/react v12 calls this at module evaluation.
      // Safari < 16.4 doesn't support it; a no-op prevents the crash.
      if (typeof CSS !== 'undefined' && typeof CSS.registerProperty === 'undefined') {
        CSS.registerProperty = function () {};
      }

      // AbortController
      if (typeof AbortController === 'undefined') {
        window.AbortController = function AbortController() {
          var listeners = [];
          this.signal = {
            aborted: false,
            addEventListener: function (_, fn) { listeners.push(fn); },
            removeEventListener: function (_, fn) { listeners = listeners.filter(function (l) { return l !== fn; }); },
          };
          this.abort = function () {
            this.signal.aborted = true;
            listeners.forEach(function (fn) { fn(); });
          };
        };
      }
    </script>

    <!--
      INLINE ERROR HANDLER — runs synchronously before any module script.
    -->
    <script>
      (function () {
        window.__rhShow = function show(title, body) {
          try {
            var root = document.getElementById('root') || document.body;
            root.innerHTML =
              '<div style="padding:16px;font:13px/1.4 ui-monospace,Menlo,monospace;background:#fff;color:#111;position:fixed;inset:0;overflow:auto;">' +
                '<div style="color:#b00020;font-weight:700;margin-bottom:8px;font-size:15px;">' + title + '</div>' +
                '<pre style="white-space:pre-wrap;word-break:break-word;background:#f5f5f5;padding:12px;border-radius:8px;margin:0;">' +
                  String(body).replace(/</g, '&lt;') +
                '</pre>' +
              '</div>';
          } catch (_) {
            console.error(title, body);
          }
        };

        window.addEventListener('error', function (e) {
          var t = e.target;
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK' || t.tagName === 'IMG')) {
            window.__rhShow(
              'Asset failed to load',
              t.tagName + ': ' + (t.src || t.href || '(no src)') +
              '\n\nCheck that vite.config.ts has base:"./" and build.outDir:"www".'
            );
            return;
          }
          var msg = e.message || '';
          var detail;
          if (!e.filename && msg.indexOf('Script error') === 0) {
            detail =
              'Opaque "Script error." — the error occurred inside a JS chunk ' +
              'but WKWebView cannot surface it here.\n\n' +
              'See the dynamic import().catch() below for the real message.';
          } else {
            detail =
              ((e.error && e.error.stack) || (e.error && e.error.message) || msg) +
              '\nFile: ' + (e.filename || '(unknown)') + ':' + (e.lineno || 0) + ':' + (e.colno || 0);
          }
          window.__rhShow('JS error', detail);
        }, true);

        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          window.__rhShow(
            'Unhandled promise rejection',
            (r && r.stack) || (r && r.message) || (typeof r === 'string' ? r : JSON.stringify(r))
          );
        });

        setTimeout(function () {
          var loader = document.getElementById('rh-loader');
          if (loader && loader.parentNode) {
            window.__rhShow(
              'App never mounted (15 s timeout)',
              'Bundle loaded but React did not render.\n' +
              'Likely: top-level await, infinite loop during module eval, or blocking network request.'
            );
          }
        }, 15000);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="rh-loader">Loading RewardHub…</div>
    </div>

    <!--
      Entry point via dynamic import so WKWebView errors are catchable.
      Static <script type="module" src="..."> errors are always opaque
      in WKWebView ("Script error." with no filename). Dynamic import()
      rejections carry the real Error object with a full stack trace.
    -->
    <script type="module">
      import('/src/main.tsx').catch(function (err) {
        var msg = (err && err.stack) || (err && err.message) || String(err);
        console.error('[Boot] Module load failed:', err);
        if (window.__rhShow) {
          window.__rhShow('Boot error — real details', msg);
        }
      });
    </script>
  </body>
</html>
