workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets # Create this group in Codemagic UI
        - firebase_secrets # Create this group in Codemagic UI
        - android_signing # Create this group in Codemagic UI
      node: 22
      java: 17
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
          node -v # To verify installation
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add Android platform
        script: npm run cap:add || true
      - name: Sync Capacitor
        script: npm run cap:sync
      - name: Build Android AAB and APK
        script: |
          cd android
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/**/*.aab
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/mapping/**/*.txt
    publishing:
      email:
        recipients:
          - m.bahlaq@dv8dm.com # User email from context
        notify:
          success: true
          failure: true
