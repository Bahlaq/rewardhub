workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets
        - firebase_secrets
        - android_signing
      node: 22
      java: 21 # <--- Set to Java 21
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build and Sync Capacitor
        script: |
          npm run build
          rm -rf android
          npm run cap:add
          npm run cap:sync
          
          # 🛠️ PATCH 1: Update Gradle to 8.7 (Supports Java 21)
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i '' 's/gradle-[0-9.]*-\(all\|bin\).zip/gradle-8.7-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
            echo "Patched gradle-wrapper.properties to version 8.7"
          fi
          
          # 🛠️ PATCH 2: Update AGP to 8.2.1 (Supports Java 21)
          if [ -f "android/build.gradle" ]; then
            sed -i '' 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.1/g' android/build.gradle
            echo "Patched android/build.gradle to AGP 8.2.1"
          fi
      - name: Build Android AAB and APK
        script: |
          export GRADLE_USER_HOME=$FCI_BUILD_DIR/.gradle
          mkdir -p $GRADLE_USER_HOME
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon
          ./gradlew assembleDebug --no-daemon --stacktrace
          ./gradlew bundleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/debug/*.apk
