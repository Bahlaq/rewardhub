workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets 
        - firebase_secrets 
        - android_signing # هذا الجروب اللي فيه الـ Keystore والباسوردات
      node: 22
      java: 21
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
          node -v 
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build and Sync Capacitor
        script: |
          mkdir -p assets
          npm run build
          
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory was not created"
            exit 1
          fi
          
          rm -rf android
          npx cap add android
          
          # توليد الأيقونات
          npx @capacitor/assets generate --android --assetPath assets
          
          # ضبط الإصدار (Version 1.0.0)
          if [ -f "android/app/build.gradle" ]; then
            sed -i '' 's/versionCode [0-9]*/versionCode 1/g' android/app/build.gradle
            sed -i '' 's/versionName "[0-9.]*"/versionName "1.0.0"/g' android/app/build.gradle
          fi
          
          npx cap sync android
          
          # ضبط Gradle ليتوافق مع Java 21
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n" > android/gradle/wrapper/gradle-wrapper.properties
          fi
      
      - name: Build Signed Android AAB
        script: |
          # 1️⃣ فك تشفير ملف الـ Keystore وحفظه في مسار مؤقت
          echo $CM_KEYSTORE | base64 --decode > $FCI_BUILD_DIR/rewardhub-key.jks
          
          # 2️⃣ بناء التطبيق وتوقيعه (Signed) باستخدام المتغيرات
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$FCI_BUILD_DIR/rewardhub-key.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD \
            --no-daemon --stacktrace

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - m.bahlaq@dv8dm.com
        notify:
          success: true
          failure: true
