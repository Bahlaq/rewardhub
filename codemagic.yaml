workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets # Create this group in Codemagic UI
        - firebase_secrets # Create this group in Codemagic UI
        - android_signing # Create this group in Codemagic UI
      node: 22
      java: 21
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
          node -v # To verify installation
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build and Sync Capacitor
        script: |
          # 🏗️ Build Web Assets
          npm run build
          
          # 🔍 Verify dist exists
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory was not created by npm run build"
            exit 1
          fi
          
          # 📱 Prepare Android Project
          rm -rf android
          npx cap add android
          
          # 🎨 Generate Assets (Ensure assets directory exists)
          mkdir -p assets
          
          # Use user-provided icon.png if it exists
          if [ -f "assets/icon.png" ]; then
            echo "✅ Using user-provided icon.png"
            cp assets/icon.png assets/icon-only.png
            cp assets/icon.png assets/icon-foreground.png
            cp assets/icon.png assets/splash.png
            # Create a simple background if it doesn't exist
            if [ ! -f "assets/icon-background.png" ]; then
              curl -L -o assets/icon-background.png "https://placehold.co/1024x1024/7c3aed/7c3aed/png"
            fi
          else
            # Use high-quality placeholders if they don't exist
            if [ ! -f "assets/icon-only.png" ]; then
              curl -L -o assets/icon-only.png "https://api.dicebear.com/7.x/initials/png?seed=R&backgroundColor=7c3aed&fontSize=50&fontWeight=900&radius=20"
            fi
            cp assets/icon-only.png assets/icon.png
            if [ ! -f "assets/icon-foreground.png" ]; then
              curl -L -o assets/icon-foreground.png "https://api.dicebear.com/7.x/initials/png?seed=R&backgroundColor=transparent&fontSize=50&fontWeight=900"
            fi
            if [ ! -f "assets/icon-background.png" ]; then
              curl -L -o assets/icon-background.png "https://placehold.co/1024x1024/7c3aed/7c3aed/png"
            fi
            if [ ! -f "assets/splash.png" ]; then
              curl -L -o assets/splash.png "https://api.dicebear.com/7.x/initials/png?seed=RewardHub&backgroundColor=7c3aed&fontSize=30&fontWeight=900"
            fi
          fi
          
          # Generate icons and splash screens
          npx @capacitor/assets generate --android --assetPath assets
          
          # 🔄 Sync Capacitor
          npx cap sync android
          
          # 🔑 Inject google-services.json
          # You can either place the file in the root directory or set the GOOGLE_SERVICES_JSON env var in Codemagic
          if [ ! -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "✅ Injecting google-services.json from environment variable"
            echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
          elif [ -f "google-services.json" ]; then
            echo "✅ Injecting google-services.json from root directory"
            cp google-services.json android/app/google-services.json
          else
            echo "⚠️ Warning: google-services.json not found. Google Sign-In might fail on Android."
          fi
          
          # 🔢 Set Version Code and Name
          if [ -f "android/app/build.gradle" ]; then
            sed -i '' 's/versionCode [0-9]*/versionCode 5/g' android/app/build.gradle
            sed -i '' 's/versionName "[0-9.]*"/versionName "5.0.0"/g' android/app/build.gradle
          fi
          
          # 🛠️ PATCH: Force Gradle 8.7 and AGP 8.2.1 for Java 21 compatibility
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n" > android/gradle/wrapper/gradle-wrapper.properties
          fi
          if [ -f "android/build.gradle" ]; then
            sed -i '' 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.1/g' android/build.gradle
            # Add Google Services classpath
            if ! grep -q "com.google.gms:google-services" android/build.gradle; then
              sed -i '' '/dependencies {/a \
              classpath "com.google.gms:google-services:4.4.1"' android/build.gradle
            fi
          fi
          
          # 🛠️ PATCH: Apply Google Services Plugin in app/build.gradle
          if [ -f "android/app/build.gradle" ]; then
            if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
              echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            fi
          fi
          
          # 🛠️ PATCH: Set SDK 35
          if [ -f "android/variables.gradle" ]; then
            sed -i '' 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g' android/variables.gradle
            sed -i '' 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g' android/variables.gradle
          fi
          
          # 🛠️ PATCH: Add AD_ID permission
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            sed -i '' 's/<application/<uses-permission android:name="com.google.android.gms.permission.AD_ID"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml
          fi
          
          # 🛠️ PATCH: Add Signing Configs to build.gradle
          if [ -f "android/app/build.gradle" ]; then
            sed -i '' '/buildTypes {/i \
            signingConfigs { \
                release { \
                    storeFile file(System.getenv("CM_KEYSTORE_PATH") ?: "rewardhub-key.jks") \
                    storePassword System.getenv("CM_KEYSTORE_PASSWORD") ?: "123456" \
                    keyAlias System.getenv("CM_KEY_ALIAS") ?: "rewardhub" \
                    keyPassword System.getenv("CM_KEY_PASSWORD") ?: "123456" \
                } \
            }' android/app/build.gradle
            
            sed -i '' '/proguardFiles/a \
                signingConfig signingConfigs.release' android/app/build.gradle
          fi
      - name: Build Signed Android (APK & AAB)
        script: |
          # 🔑 Decode Keystore
          echo $CM_KEYSTORE | base64 --decode > $FCI_BUILD_DIR/android/app/rewardhub-key.jks
          
          cd android
          chmod +x gradlew
          
          # 🏗️ Build APK and AAB with Signing
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$FCI_BUILD_DIR/android/app/rewardhub-key.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD \
            --no-daemon
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - m.bahlaq@dv8dm.com # User email from context
        notify:
          success: true
          failure: true
      # You can also configure Google Play Store publishing here
