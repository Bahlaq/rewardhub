workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets
        - firebase_secrets
        - android_signing
      node: 22
      java: 21 # <--- Required for Java 21 class files
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
          node -v
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build and Sync Capacitor
        script: |
          npm run build
          rm -rf android
          npm run cap:add
          npm run cap:sync
          
          # 🛠️ PATCH 1: Force Gradle 8.7 (Supports Java 21)
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            cat > android/gradle/wrapper/gradle-wrapper.properties <<EOF
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
            echo "Forced Gradle version to 8.7"
          fi
          
          # 🛠️ PATCH 2: Force AGP 8.2.1 (Supports Java 21)
          if [ -f "android/build.gradle" ]; then
            sed -i '' 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.1/g' android/build.gradle
            echo "Forced AGP version to 8.2.1"
          fi
      - name: Build Android AAB and APK
        script: |
          export GRADLE_USER_HOME=$FCI_BUILD_DIR/.gradle
          mkdir -p $GRADLE_USER_HOME
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon
          ./gradlew assembleDebug --no-daemon --stacktrace
          ./gradlew bundleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/debug/*.apk
