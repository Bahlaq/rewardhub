workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - android_signing
        - admob_secrets
        - firebase_secrets
      node: 22
      java: 21

    scripts:

      - name: Install Node 22
        script: |
          brew install node@22 || true
          brew link --overwrite node@22 || true
          echo "Node: $(node -v)"
          echo "NPM:  $(npm -v)"

      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Build web assets
        script: |
          npm run build
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ was not created"
            exit 1
          fi
          ls dist/

      - name: Deploy to Firebase Hosting
        script: |
          npx firebase-tools deploy \
            --only hosting \
            --token "$FIREBASE_TOKEN" \
            --non-interactive \
            --project rewardhub-1ea27
          echo "Live: https://rewardhub-1ea27.web.app"

      - name: Add Android platform
        script: |
          rm -rf android
          npx cap add android

      - name: Generate app assets
        script: |
          mkdir -p assets
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png assets/icon-only.png
            cp assets/icon.png assets/icon-foreground.png
            cp assets/icon.png assets/splash.png
            if [ ! -f "assets/icon-background.png" ]; then
              curl -sL -o assets/icon-background.png \
                "https://placehold.co/1024x1024/4f46e5/4f46e5/png" || true
            fi
          else
            curl -sL -o assets/icon.png \
              "https://api.dicebear.com/7.x/initials/png?seed=RH&backgroundColor=4f46e5&fontSize=50&fontWeight=900&radius=20" || true
            cp assets/icon.png assets/icon-only.png
            cp assets/icon.png assets/icon-foreground.png
            curl -sL -o assets/icon-background.png \
              "https://placehold.co/1024x1024/4f46e5/4f46e5/png" || true
            curl -sL -o assets/splash.png \
              "https://api.dicebear.com/7.x/initials/png?seed=RH&backgroundColor=4f46e5&fontSize=30" || true
          fi
          npx @capacitor/assets generate --android --assetPath assets || true

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Inject google-services.json
        script: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
            echo "Injected from Codemagic secret."
          elif [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "Copied from repo root."
          else
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set and no file in repo root."
            exit 1
          fi
          python3 -c "
          import json
          with open('android/app/google-services.json') as f:
              d = json.load(f)
          pkg = d['client'][0]['client_info']['android_client_info']['package_name']
          assert pkg == 'com.rewardhub.official.app', 'Package mismatch: ' + pkg
          print('Verified package:', pkg)
          "

      - name: Patch Gradle files
        script: |
          # Pin Gradle to 8.7 (Java 21 compatible)
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' \
            > android/gradle/wrapper/gradle-wrapper.properties
          echo "Gradle wrapper -> 8.7"

          # Pin Android Gradle Plugin to 8.2.1
          sed -i "s|com.android.tools.build:gradle:[0-9.]*|com.android.tools.build:gradle:8.2.1|g" \
            android/build.gradle

          # Add google-services classpath to root build.gradle if missing
          if ! grep -q "com.google.gms:google-services" android/build.gradle; then
            sed -i '/dependencies {/a\        classpath "com.google.gms:google-services:4.4.1"' \
              android/build.gradle
          fi

          # FIX: Remove duplicate google-services try/catch block from app/build.gradle
          python3 << 'PYEOF'
          import re
          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()
          cleaned = re.sub(
              r'\ntry\s*\{[^{}]*apply\s+plugin\s*:\s*[\'"]com\.google\.gms\.google-services[\'"][^{}]*\}\s*catch\s*\([^)]*\)\s*\{[^{}]*\}',
              '',
              content
          )
          if cleaned != content:
              with open(path, 'w') as f:
                  f.write(cleaned)
              print('Removed duplicate google-services block.')
          else:
              print('No duplicate block found.')
          PYEOF

          # FIX: Espresso variable name typo
          sed -i "s/indigoEspressoCoreVersion/androidEspressoCoreVersion/g" \
            android/app/build.gradle
          echo "Espresso typo fixed."

          # Ensure google-services plugin is applied in app/build.gradle
          if ! grep -q "apply plugin: 'com.google.gms.google-services'" android/app/build.gradle; then
            printf "\napply plugin: 'com.google.gms.google-services'\n" >> android/app/build.gradle
          fi

          # Set SDK versions
          if [ -f "android/variables.gradle" ]; then
            sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/" android/variables.gradle
            sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/"   android/variables.gradle
          fi

          # Add AD_ID permission if missing
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "AD_ID" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID" />|' \
              "$MANIFEST"
          fi

          echo "All patches done."

      - name: Set version
        script: |
          VC="${APP_VERSION_CODE:-10}"
          VN="9.2.0"
          sed -i "s/versionCode [0-9]*/versionCode ${VC}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VN}\"/" android/app/build.gradle
          echo "Version: ${VN} (code ${VC})"

      - name: Add signing config
        script: |
          python3 << 'PYEOF'
          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()

          if 'signingConfigs' not in content:
              block = (
                  '\n    signingConfigs {\n'
                  '        release {\n'
                  '            storeFile file(System.getenv("CM_KEYSTORE_PATH") ?: "rewardhub-key.jks")\n'
                  '            storePassword System.getenv("CM_KEYSTORE_PASSWORD") ?: ""\n'
                  '            keyAlias System.getenv("CM_KEY_ALIAS") ?: ""\n'
                  '            keyPassword System.getenv("CM_KEY_PASSWORD") ?: ""\n'
                  '        }\n'
                  '    }\n'
              )
              content = content.replace('    buildTypes {', block + '    buildTypes {', 1)
              print('signingConfigs added.')
          else:
              print('signingConfigs already present.')

          if 'signingConfig signingConfigs.release' not in content:
              content = content.replace(
                  'minifyEnabled false',
                  'minifyEnabled false\n            signingConfig signingConfigs.release',
                  1
              )
              print('Release buildType linked to signingConfig.')

          with open(path, 'w') as f:
              f.write(content)
          PYEOF

      - name: Build signed APK and AAB
        script: |
          echo "$CM_KEYSTORE" | base64 --decode \
            > "$FCI_BUILD_DIR/android/app/rewardhub-key.jks"

          cd android
          chmod +x gradlew

          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file="$FCI_BUILD_DIR/android/app/rewardhub-key.jks" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD" \
            --no-daemon \
            --stacktrace

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - m.bahlaq94@gmail.com
        notify:
          success: true
          failure: true
