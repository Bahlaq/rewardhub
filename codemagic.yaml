workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets
        - firebase_secrets
        - android_signing
      node: 22
      java: 21
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
          node -v
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build and Sync Capacitor
        script: |
          npm run build
          if [ ! -d "dist" ]; then echo "❌ dist not found"; exit 1; fi
          
          rm -rf android
          npx cap add android
          
          # Assets
          mkdir -p assets
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png assets/icon-only.png
            cp assets/icon.png assets/icon-foreground.png
            cp assets/icon.png assets/splash.png
            [ ! -f "assets/icon-background.png" ] && curl -L -o assets/icon-background.png "https://placehold.co/1024x1024/7c3aed/7c3aed/png"
          else
            [ ! -f "assets/icon-only.png" ] && curl -L -o assets/icon-only.png "https://api.dicebear.com/7.x/initials/png?seed=R&backgroundColor=7c3aed&fontSize=50&fontWeight=900&radius=20"
            cp assets/icon-only.png assets/icon.png
            [ ! -f "assets/icon-foreground.png" ] && curl -L -o assets/icon-foreground.png "https://api.dicebear.com/7.x/initials/png?seed=R&backgroundColor=transparent&fontSize=50&fontWeight=900"
            [ ! -f "assets/icon-background.png" ] && curl -L -o assets/icon-background.png "https://placehold.co/1024x1024/7c3aed/7c3aed/png"
            [ ! -f "assets/splash.png" ] && curl -L -o assets/splash.png "https://api.dicebear.com/7.x/initials/png?seed=RewardHub&backgroundColor=7c3aed&fontSize=30&fontWeight=900"
          fi
          npx @capacitor/assets generate --android --assetPath assets
          npx cap sync android
          
          # google-services.json
          if [ ! -z "$GOOGLE_SERVICES_JSON" ]; then
            echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
            echo "✅ google-services.json injected"
          elif [ -f "google-services.json" ]; then
            cp google-services.json android/app/google-services.json
            echo "✅ google-services.json copied"
          else
            echo "⚠️ google-services.json not found"
          fi
          
          # server_client_id in strings.xml (needed by codetrix-studio plugin)
          STRINGS_XML="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_XML" ]; then
            if ! grep -q "server_client_id" "$STRINGS_XML"; then
              sed -i '' 's|</resources>|    <string name="server_client_id">563861371307-cg3bnlt6j34r88odgtn5t5816o6dlchc.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_XML"
              echo "✅ server_client_id injected"
            fi
          fi
          
          # Version
          if [ -f "android/app/build.gradle" ]; then
            sed -i '' 's/versionCode [0-9]*/versionCode 14/g' android/app/build.gradle
            sed -i '' 's/versionName "[0-9.]*"/versionName "12.1.0"/g' android/app/build.gradle
          fi
          
          # Gradle 8.7 + AGP 8.2.1
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n" > android/gradle/wrapper/gradle-wrapper.properties
          fi
          if [ -f "android/build.gradle" ]; then
            sed -i '' 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.1/g' android/build.gradle
            if ! grep -q "com.google.gms:google-services" android/build.gradle; then
              sed -i '' '/dependencies {/a \
              classpath "com.google.gms:google-services:4.4.1"' android/build.gradle
            fi
          fi
          
          # Google Services plugin
          if [ -f "android/app/build.gradle" ]; then
            if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
              echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            fi
          fi
          
          # SDK 35
          if [ -f "android/variables.gradle" ]; then
            sed -i '' 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g' android/variables.gradle
            sed -i '' 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g' android/variables.gradle
          fi
          
          # AD_ID permission + AdMob App ID
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "com.google.android.gms.permission.AD_ID" "$MANIFEST"; then
              sed -i '' 's/<application/<uses-permission android:name="com.google.android.gms.permission.AD_ID"\/>\n    <application/g' "$MANIFEST"
            fi
            if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST"; then
              sed -i '' 's|</application>|        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-1560161047680443~4972275282"/>\n    </application>|' "$MANIFEST"
            fi
          fi
          
          # Signing
          if [ -f "android/app/build.gradle" ]; then
            sed -i '' '/buildTypes {/i \
            signingConfigs { \
                release { \
                    storeFile file(System.getenv("CM_KEYSTORE_PATH") ?: "rewardhub-key.jks") \
                    storePassword System.getenv("CM_KEYSTORE_PASSWORD") ?: "123456" \
                    keyAlias System.getenv("CM_KEY_ALIAS") ?: "rewardhub" \
                    keyPassword System.getenv("CM_KEY_PASSWORD") ?: "123456" \
                } \
            }' android/app/build.gradle
            sed -i '' '/proguardFiles/a \
                signingConfig signingConfigs.release' android/app/build.gradle
          fi
      - name: Build Signed Android
        script: |
          echo $CM_KEYSTORE | base64 --decode > $FCI_BUILD_DIR/android/app/rewardhub-key.jks
          cd android && chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$FCI_BUILD_DIR/android/app/rewardhub-key.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD \
            --no-daemon
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - m.bahlaq@dv8dm.com
        notify:
          success: true
          failure: true
