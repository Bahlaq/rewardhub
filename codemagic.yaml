workflows:
  android-capacitor-release:
    name: Android Capacitor Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - admob_secrets # Create this group in Codemagic UI
        - firebase_secrets # Create this group in Codemagic UI
        - android_signing # Create this group in Codemagic UI
      node: 22
      java: 21
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          brew link --overwrite node@22
          node -v # To verify installation
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build and Sync Capacitor
        script: |
          npm run build
          echo "--- DIST FOLDER CONTENTS ---"
          ls -R dist
          rm -rf android
          npm run cap:add
          
          # 🎨 Generate Assets
          npx @capacitor/assets generate --android
          
          # 🔢 Set Version Code and Name
          sed -i '' 's/versionCode [0-9]*/versionCode 1/g' android/app/build.gradle
          sed -i '' 's/versionName "[0-9.]*"/versionName "1.0.0"/g' android/app/build.gradle
          echo "Set Version Code: 1, Version Name: 1.0.0"
          
          npm run cap:sync
          
          # 🛠️ PATCH 1: Force Gradle 8.7 (Supports Java 21)
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n" > android/gradle/wrapper/gradle-wrapper.properties
            echo "Forced Gradle version to 8.7"
            cat android/gradle/wrapper/gradle-wrapper.properties
          fi
          
          # 🛠️ PATCH 2: Force AGP 8.2.1 (Supports Java 21)
          if [ -f "android/build.gradle" ]; then
            sed -i '' 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.1/g' android/build.gradle
            echo "Forced AGP version to 8.2.1"
            grep "com.android.tools.build:gradle" android/build.gradle
          fi
          
          echo "--- NATIVE ASSETS CONTENTS ---"
          ls -R android/app/src/main/assets/public
      - name: Build Android AAB and APK
        script: |
          # Isolate Gradle cache
          export GRADLE_USER_HOME=$FCI_BUILD_DIR/.gradle
          mkdir -p $GRADLE_USER_HOME
          
          cd android
          chmod +x gradlew
          
          # Aggressive clean
          ./gradlew clean --no-daemon
          
          # Build
          ./gradlew assembleDebug --no-daemon --stacktrace
          ./gradlew bundleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/debug/*.apk
      - android/app/build/outputs/mapping/release/*.txt
    publishing:
      email:
        recipients:
          - m.bahlaq@dv8dm.com # User email from context
        notify:
          success: true
          failure: true
      # You can also configure Google Play Store publishing here
