// ═══════════════════════════════════════════════════════════════════════════
// android/app/build.gradle
//
// IDENTITY CROSS-CHECK:
//   applicationId  → com.rewardhub.official.app
//   Must match:
//     AndroidManifest.xml  → package attribute              ✓
//     google-services.json → android_client_info.package_name ✓
//     capacitor.config.ts  → appId                         ✓
//     Firebase Console     → Android App package name      ✓
//     Google Play Console  → Application ID (if published) ✓
// ═══════════════════════════════════════════════════════════════════════════

apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'  // MUST be last among apply plugins

android {
    namespace "com.rewardhub.official.app"
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        // ─── Package identity ───────────────────────────────────────────────
        applicationId "com.rewardhub.official.app"

        // ─── SDK versions ───────────────────────────────────────────────────
        minSdkVersion    rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        // ─── Version ────────────────────────────────────────────────────────
        // versionCode must be incremented for every Play Store / Codemagic build.
        // versionName is the human-readable string shown in the store.
        versionCode 9
        versionName "9.2.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            // Disable minification for now — enable only after testing ProGuard rules
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            // Debug builds keep the same applicationId so Google Sign-In SHA-1 works
            applicationIdSuffix ""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-ktx:$androidxCoreKTXVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidTestJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidEspressoCoreVersion"
}
